components:
  schemas:
    Contact:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        number:
          type: string
          maxLength: 30
        subject:
          type: string
          maxLength: 255
        text:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - full_name
      - id
      - number
      - subject
      - text
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        image:
          type: string
          format: uri
          maxLength: 200
        teacher:
          type: integer
          nullable: true
        teacherId:
          type: integer
          readOnly: true
      required:
      - id
      - teacherId
      - title
    Document:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
